[tool.ruff]
line-length = 100
target-version = "py311"
src = ["app", "scripts", "tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "ANN",
]
ignore = [
  "ANN001",
  "ANN201",
  "ANN202",
  "ANN204",
  "ANN401",
  "B008",
  "B904",
  "E402",
  "E501",
  "UP042",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "S101"]
"scripts/**/*.py" = ["ANN201"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
