services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: easydoc_local
    volumes:
      - mongodb_data:/data/db
    networks:
      - easydoc-local-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - easydoc-local-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    networks:
      - easydoc-local-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - easydoc-local-network
    entrypoint: >
      /bin/sh -c "
        mc alias set easydoc-local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing easydoc-local/sgdia-documents;
        mc mb --ignore-existing easydoc-local/sgdia-exports;
        mc mb --ignore-existing easydoc-local/sgdia-avatars;
        mc mb --ignore-existing easydoc-local/sgdia-temp;
        mc ilm rule add --expiry-days 7 easydoc-local/sgdia-temp || true;
        echo 'Local EASYDOC buckets ready';
      "

  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    ports:
      - "8180:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: easydoc-local-onlyoffice-secret
      JWT_HEADER: Authorization
    networks:
      - easydoc-local-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8100:8000"
    environment: &backend-environment
      APP_NAME: EASYDOC Local
      DEBUG: "true"
      SECRET_KEY: easydoc-local-secret-change-before-production
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: easydoc_local
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET_KEY: easydoc-local-jwt-change-before-production
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: "1440"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET_NAME: sgdia-documents
      ONLYOFFICE_URL: http://onlyoffice
      LOCAL_ASR_MODEL_PATH: /models/vosk-es
      LLM_PROVIDER: local_offline
      CORS_ORIGINS: '["http://localhost:4300"]'
    volumes:
      - ./backend:/app
      - ./backend/local_models:/models:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - easydoc-local-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q default,documents,notifications
    environment: *backend-environment
    volumes:
      - ./backend:/app
      - ./backend/local_models:/models:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - easydoc-local-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule
    environment: *backend-environment
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      - easydoc-local-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "4300:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - easydoc-local-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4200').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: /bin/sh -c "python scripts/seed_db.py && python scripts/seed_easydoc_demo.py"
    environment: *backend-environment
    depends_on:
      backend:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - easydoc-local-network

volumes:
  mongodb_data:
  redis_data:
  minio_data:
  frontend_node_modules:

networks:
  easydoc-local-network:
    name: easydoc-local-network
